<!DOCTYPE html>
<html>
<head>
    <title>學校帳號登入系統</title>
</head>
<body>
    <h2>🔑 學校帳號登入系統</h2>
    <hr>

    <form method="POST">
        {% csrf_token %} {{ form.as_p }} <br>
        <button type="submit" style="padding: 5px 15px; cursor: pointer;">登入</button>
    </form>

    <p style="color: gray; font-size: 14px; margin-top: 20px;">
        （提示：請輸入妳在 Django Admin 後台幫測試帳號設定的帳密，且該帳號的 Email 必須是學校信箱）
    </p>
</body>
</html>
