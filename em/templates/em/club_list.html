<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>社團列表總覽</title>
</head>
<body>
    <h1>🏫 學校社團總覽</h1>
    <a href="{% url 'apply_add' %}" style="font-size: 18px; color: blue;">👉 我要填寫轉社申請單</a>
    <hr>
    
    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th>社團名稱</th>
                <th>社團屬性</th>
                <th>社團名額</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for club in object_list %}
            <tr>
                <td><strong>{{ club.clubname }}</strong></td>
                <td>{{ club.category }}</td>
                <td>{{ club.memberaccount }} 人</td>
                <td>
                    <a href="{% url 'club_detail' club.id %}">查看詳細資料</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">目前沒有任何社團資料，請先去後台新增喔！</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
