<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>臺北市立大直高級中學 e-Course 3.0 學生轉社系統</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #f7931e 0%, #f15a24 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            width: 360px;
            text-align: center;
        }
        .logo-area {
            margin-bottom: 25px;
        }
        .logo-title {
            color: #d9534f;
            font-size: 20px;
            font-weight: bold;
            margin: 5px 0;
        }
        .logo-subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #428bca;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #3071a9;
        }
        .divider {
            margin: 20px 0;
            border-bottom: 1px solid #eee;
            position: relative;
        }
        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: white;
            color: #555;
            border: 1px solid #bbb;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-google:hover {
            background-color: #f5f5f5;
        }
        .google-icon {
            color: #dd4b39;
            font-weight: bold;
            font-size: 18px;
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-area">
        <div class="logo-title">臺北市立大直高級中學</div>
        <div class="logo-subtitle">e-Course 3.0 學生轉社管理系統</div>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <input type="text" name="username" placeholder="請輸入學號 / 帳號" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="密碼" required>
        </div>
        <button type="submit" class="btn-submit">登入 (Login)</button>
    </form>

    <div class="divider"></div>

    <a href="https://ecourse.dcsh.tp.edu.tw/學習平台/" target="_blank" class="btn-google">
        <span class="google-icon">G</span> 大直高中學校信箱登入
    </a>
</div>

</body>
</html>
